services:
  # ----------------------------
  # 1. Zookeeper
  # ----------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: newsbot-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ----------------------------
  # 2. Kafka
  # ----------------------------
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: newsbot-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Internal - Docker network and External - Localhost
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ----------------------------
  # 3. PostgreSQL
  # ----------------------------
  postgres:
    image: pgvector/pgvector:pg15
    container_name: newsbot-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_news:/var/lib/postgresql/data

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    depends_on:
      - postgres
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"

  # ----------------------------
  # 4. Redis for scraper
  # ----------------------------
  redis:
    image: redis:alpine
    container_name: newsbot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ----------------------------
  # Kafka UI
  # ----------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: newsbot-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ----------------------------
  # 5. Prometheus
  # ----------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: newsbot-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'

  # ----------------------------
  # 6. Grafana
  # ----------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: newsbot-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_PROVISIONING_DATASOURCES_PATH=/etc/grafana/provisioning/datasources
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

  # ----------------------------
  # 7. Node Exporter (host metrics)
  # ----------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: newsbot-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'

  # ----------------------------
  # Loki (log aggregation)
  # ----------------------------
  loki:
    image: grafana/loki:latest
    container_name: newsbot-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # ----------------------------
  # Promtail (log shipper → Loki)
  # ----------------------------
  promtail:
    image: grafana/promtail:latest
    container_name: newsbot-promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki


volumes:
  postgres_data_news:
  mongo_data:
  redis_data:
  grafana_data:
  prometheus_data:
  loki_data: