apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: dimaubuntu/newsbot-ai:latest
          imagePullPolicy: Always
          env:
            - name: POSTGRES_HOST
              value: "news-postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: KAFKA_BROKER
              value: "news-kafka:9092"
          envFrom:
            - secretRef:
                name: newsbot-secrets