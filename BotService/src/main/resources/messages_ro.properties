help.full_text=\u2728 <b>Bine ai venit la NewsBot!</b> \u2728\n\nSunt curatorul t\u0103u personal de \u0219tiri bazat pe AI. Filtrez zgomotul \u0219i \u00EE\u021Bi livrez doar ceea ce te intereseaz\u0103 cu adev\u0103rat.\n\n<b>\uD83C\uDFA8 Acces rapid:</b>\n\u2022 Apas\u0103 <b>\u2630 Butonul Meniu</b> (l\u00E2ng\u0103 c\u00E2mpul de introducere text) pentru a deschide Web App\n\u2022 Sau folose\u0219te butoanele de mai jos pentru ac\u021Biuni rapide\n\n<b>\uD83D\uDCCC Butoane tastatur\u0103:</b>\n\u2022 \uD83D\uDCDA <b>Sursele mele</b> \u2014 Vezi \u0219i gestioneaz\u0103 sursele tale\n\u2022 \uD83C\uDFAF <b>Interesele mele</b> \u2014 Actualizeaz\u0103 interesele\n\u2022 \u2753 <b>Ajutor</b> \u2014 Afi\u0219eaz\u0103 acest meniu\n\n<b>\u26A1 Comenzi text:</b>\n/start \u2014 \u00CEncepe\n/help \u2014 Afi\u0219eaz\u0103 acest meniu\n\n<b>\uD83C\uDFAF Gestionare interese:</b>\n/myinterests <code>[subiecte]</code>\nSpune-mi ce \u00EE\u021Bi place! Voi c\u0103uta \u0219tiri care corespund acestor cuvinte-cheie.\n\n<b>\uD83D\uDCDA Gestionare surse:</b>\n/addsource <code>[link]</code> \u2014 Aboneaz\u0103-te la un canal Telegram sau feed RSS\n/removesource <code>[link]</code> \u2014 Dezaboneaz\u0103-te de la o surs\u0103\n/sources \u2014 Vezi abonamentele active\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n<b>\uD83D\uDCA1 Exemple:</b>\n<code>/myinterests Crypto, SpaceX, Java 21</code>\n<code>/addsource durov</code>\n\n<b>\uD83C\uDFA8 Sfat:</b>\nFolose\u0219te Web App (\u2630 Butonul Meniu) pentru cea mai bun\u0103 experien\u021B\u0103, cu interfa\u021B\u0103 modern\u0103 \u0219i actualiz\u0103ri \u00EEn timp real!

