 \u041E\u0431\u043D\u043E\u0432\u0438\u0442\u044C \u0438\u043D\u0442\u0435\u0440\u0435\u0441\u044B\n\u2022 \u2753 <b>\u041F\u043E\u043C\u043E\u0449\u044C</b> \u2014 \u041F\u043E\u043A\u0430\u0437\u0430\u0442\u044C \u044D\u0442\u043E \u043C\u0435\u043D\u044E\n\n<b>\u26A1 \u0422\u0435\u043A\u0441\u0442\u043E\u0432\u044B\u0435 \u043A\u043E\u043C\u0430\u043D\u0434\u044B:</b>\n/start \u2014 \u041D\u0430\u0447\u0430\u0442\u044C\n/help \u2014 \u041F\u043E\u043A\u0430\u0437\u0430\u0442\u044C \u044D\u0442\u043E \u043C\u0435\u043D\u044E\n\n<b>\uD83C\uDFAF \u0423\u043F\u0440\u0430\u0432\u043B\u0435\u043D\u0438\u0435 \u0438\u043D\u0442\u0435\u0440\u0435\u0441\u0430\u043C\u0438:</b>\n/myinterests <code>[\u0442\u0435\u043C\u044B]</code>\n\u0420\u0430\u0441\u0441\u043A\u0430\u0436\u0438\u0442\u0435, \u0447\u0442\u043E \u0432\u0430\u043C \u0438\u043D\u0442\u0435\u0440\u0435\u0441\u043D\u043E! \u042F \u0431\u0443\u0434\u0443 \u0438\u0441\u043A\u0430\u0442\u044C \u043D\u043E\u0432\u043E\u0441\u0442\u0438 \u043F\u043E \u044D\u0442\u0438\u043C \u043A\u043B\u044E\u0447\u0435\u0432\u044B\u043C \u0441\u043B\u043E\u0432\u0430\u043C.\n\n<b>\uD83D\uDCDA \u0423\u043F\u0440\u0430\u0432\u043B\u0435\u043D\u0438\u0435 \u0438\u0441\u0442\u043E\u0447\u043D\u0438\u043A\u0430\u043C\u0438:</b>\n/addsource <code>[\u0441\u0441\u044B\u043B\u043A\u0430]</code> \u2014 \u041F\u043E\u0434\u043F\u0438\u0441\u0430\u0442\u044C\u0441\u044F \u043D\u0430 Telegram-\u043A\u0430\u043D\u0430\u043B \u0438\u043B\u0438 RSS-\u043B\u0435\u043D\u0442\u0443\n/removesource <code>[\u0441\u0441\u044B\u043B\u043A\u0430]</code> \u2014 \u041E\u0442\u043F\u0438\u0441\u0430\u0442\u044C\u0441\u044F \u043E\u0442 \u0438\u0441\u0442\u043E\u0447\u043D\u0438\u043A\u0430\n/sources \u2014 \u041F\u043E\u0441\u043C\u043E\u0442\u0440\u0435\u0442\u044C \u0430\u043A\u0442\u0438\u0432\u043D\u044B\u0435 \u043F\u043E\u0434\u043F\u0438\u0441\u043A\u0438\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u25