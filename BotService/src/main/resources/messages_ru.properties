help.full_text=\u2728 <b>Добро пожаловать в NewsBot!</b> \u2728\n\nЯ ваш персональный AI-куратор новостей. Я отфильтровываю шум и показываю только то, что вам действительно интересно.\n\n<b>\uD83C\uDFA8 Быстрый доступ:</b>\n• Нажмите <b>\u2630 Кнопку меню</b> (рядом с полем ввода), чтобы открыть Web App\n• Или используйте кнопки клавиатуры ниже для быстрых действий\n\n<b>\uD83D\uDCCC Кнопки клавиатуры:</b>\n• \uD83D\uDCDA <b>Мои источники</b> — Просмотр и управление источниками\n• \uD83C\uDFAF <b>Мои интересы</b> — Обновить интересы\n• \u2753 <b>Помощь</b> — Показать это меню\n\n<b>\u26A1 Текстовые команды:</b>\n/start — Начать\n/help — Показать это меню\n\n<b>\uD83C\uDFAF Управление интересами:</b>\n/myinterests <code>[темы]</code>\nРасскажите, что вам интересно! Я буду искать новости по этим ключевым словам.\n\n<b>\uD83D\uDCDA Управление источниками:</b>\n/addsource <code>[ссылка]</code> — Подписаться на Telegram-канал или RSS-ленту\n/removesource <code>[ссылка]</code> — Отписаться от источника\n/sources — Посмотреть активные подписки\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n<b>\uD83D\uDCA1 Примеры:</b>\n<code>/myinterests Crypto, SpaceX, Java 21</code>\n<code>/addsource durov</code>\n\n<b>\uD83C\uDFA8 Совет:</b>\nИспользуйте Web App (\u2630 Кнопку меню) для лучшего опыта с современным интерфейсом и обновлениями в реальном времени!

