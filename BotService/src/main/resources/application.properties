spring.application.name=BotService
server.port=8016

api.base.url=${VITE_API_BASE_URL}

# Database
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:newsbot_db}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=0
spring.flyway.default-schema=public
spring.flyway.schemas=public
spring.jpa.defer-datasource-initialization=true

# Telegram
telegram.bot.username=NewsAggregatorDandDBot
telegram.bot.token=${TG_BOT_TOKEN}
telegram.webapp.url=https://DmitriiKaban.github.io/NewsAggregationPlatform/

# Point to your compose file
spring.docker.compose.file=common/docker-compose.yml
# STOP Spring from trying to start/stop Docker, I do it manually
spring.docker.compose.lifecycle-management=none

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BROKER:localhost:9092}
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}


