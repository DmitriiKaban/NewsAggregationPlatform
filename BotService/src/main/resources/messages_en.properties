help.full_text=\u2728 <b>Welcome to NewsBot!</b> \u2728\n\nI am your personal AI news curator. I filter out the noise and deliver only what you care about.\n\n<b>\uD83C\uDFA8 Quick Access:</b>\n\u2022 Click the <b>\u2630 Menu Button</b> (next to text input) to open the Web App\n\u2022 Or use the keyboard buttons below for quick actions\n\n<b>\uD83D\uDCCC Keyboard Buttons:</b>\n\u2022 \uD83D\uDCDA <b>My Sources</b> - View and manage your news sources\n\u2022 \uD83C\uDFAF <b>My Interests</b> - Update your interests\n\u2022 \u2753 <b>Help</b> - Show this menu\n\n<b>\u26A1 Text Commands:</b>\n/start - Begin your journey\n/help - Show this menu\n\n<b>\uD83C\uDFAF Manage Interests:</b>\n/myinterests <code>[topics]</code>\nTell me what you love! I will hunt for news matching these keywords.\n\n<b>\uD83D\uDCDA Manage Sources:</b>\n/addsource <code>[link]</code> - Subscribe to a Telegram channel or RSS feed\n/removesource <code>[link]</code> - Unsubscribe from a source\n/sources - See your active subscriptions\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n<b>\uD83D\uDCA1 Examples:</b>\n<code>/myinterests Crypto, SpaceX, Java 21</code>\n<code>/addsource durov</code>\n\n<b>\uD83C\uDFA8 Pro Tip:</b>\nUse the Web App (\u2630 Menu Button) for the best experience with modern UI and real-time updates!

